name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Find Project Directory
        run: |
          # Find the directory containing package.json (excluding node_modules)
          PKG_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "ERROR: package.json not found in the repository!"
            ls -R
            exit 1
          fi
          # Get the folder path
          APP_DIR=$(dirname "$PKG_PATH")
          echo "Found project at: $APP_DIR"
          # Save it for other steps
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm install --legacy-peer-deps --no-package-lock

      - name: Build Web App
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: Setup Capacitor and Android
        working-directory: ${{ env.APP_DIR }}
        run: |
          npm install @capacitor/android @capacitor/core @capacitor/cli
          npx cap add android
          npx cap sync

      - name: Build Android APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pcos-app-apk
          path: "${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk"
