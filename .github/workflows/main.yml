name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          ZIP_FILE=$(find . -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Unzipping $ZIP_FILE..."
            unzip "$ZIP_FILE" -d extracted_project
            REAL_DIR=$(find ./extracted_project -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
            echo "Project found at: $REAL_DIR"
            echo "APP_DIR=$REAL_DIR" >> $GITHUB_ENV
          else
            APP_DIR=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
            if [ -z "$APP_DIR" ]; then
                echo "ERROR: Neither ZIP nor package.json found!"
                ls -R
                exit 1
            fi
            echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          npm install --legacy-peer-deps --no-package-lock
          npm install react-is --save-dev --legacy-peer-deps --no-package-lock

      - name: Build Web App
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: Setup Capacitor and Android
        working-directory: ${{ env.APP_DIR }}
        run: |
          npm install @capacitor/android @capacitor/core @capacitor/cli
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.dr.avinalli.app", "appName": "PCOS Tracker", "webDir": "dist"}' > capacitor.config.json
          fi
          npx cap add android || true
          npx cap sync

      - name: Patch Gradle for Kotlin Duplicates
        working-directory: ${{ env.APP_DIR }}
        run: |
          # This command injects a fix into the Android build file to resolve duplicate Kotlin classes
          if [ -f "android/build.gradle" ]; then
            sed -i '/allprojects {/a \    configurations.all {\n        resolutionStrategy.eachDependency { details ->\n            if (details.requested.group == "org.jetbrains.kotlin") {\n                details.useVersion "1.8.22"\n            }\n        }\n    }' android/build.gradle
            echo "Patch applied to android/build.gradle"
          fi

      - name: Build Android APK
        working-directory: ${{ env.APP_DIR }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pcos-app-apk
          path: "${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pcos-app-apk
          path: "${{ env.APP_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk"
